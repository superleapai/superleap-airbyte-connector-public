documentationUrl: https://docs.superleap.com/api-reference/airbyte/introduction
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  type: object
  required:
    - api_key
  additionalProperties: true
  properties:
    api_key:
      type: string
      title: API Key
      description: >-
        Your Superleap API key. Generate one from
        https://app.superleap.com/settings/apiAccess
      airbyte_secret: true
      order: 0
    base_url:
      type: string
      title: Base URL
      description: Base URL of your Superleap instance.
      default: "https://app.superleap.com/"
      order: 1
    start_date:
      type: string
      title: Start Date
      description: >-
        Start date for incremental syncs (ISO 8601 format).
        Only records updated after this date will be synced on the first run.
        If not provided, all records will be fetched on the first run.
      format: date-time
      order: 2
    replication_lag_minutes:
      type: integer
      title: Replication Lag Grace Period (minutes)
      description: >-
        Grace period in minutes to account for replication lag between
        your primary database and read replica. The incremental cursor
        is shifted back by this amount to avoid missing records that
        haven't replicated yet. Duplicate records should be deduplicated by
        the destination using the primary key.
      default: 5
      minimum: 0
      maximum: 30
      order: 3

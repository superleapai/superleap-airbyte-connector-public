documentationUrl: https://docs.superleap.com/api-reference/airbyte/introduction
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  type: object
  required:
    - api_key
  additionalProperties: true
  properties:
    api_key:
      type: string
      title: API Key
      description: >-
        Your Superleap API key. Generate one from
        https://app.superleap.com/settings/apiAccess
      airbyte_secret: true
      order: 0
    base_url:
      type: string
      title: Base URL
      description: Base URL of your Superleap instance.
      default: "https://app.superleap.com/"
      order: 1
    start_date:
      type: string
      title: Start Date
      description: >-
        Start date for incremental syncs (ISO 8601 format).
        Only records updated after this date will be synced on the first run.
      format: date-time
      default: "2024-01-01T00:00:00Z"
      order: 2
